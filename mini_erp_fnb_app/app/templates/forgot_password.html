<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - Mini ERP</title>
    <link rel="stylesheet" href="/static/style.css?v=63">
</head>
<body>
<div class="login-page">
    <div class="card login-box">
        <div class="login-logo">ERP</div>
        <p class="eyebrow">Mini ERP</p>
        <h1>Quên mật khẩu</h1>
        <p class="page-desc">Nhập username của user cần cấp lại mật khẩu. Hệ thống sẽ gửi yêu cầu đến User Admin đang được maintain trong User Master Data.</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        {% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
        <form method="post" action="/forgot-password">
            <label>Username
                <input name="username" autocomplete="username" placeholder="Ví dụ: master_user" required>
            </label>
            <button type="submit">Gửi yêu cầu cấp lại mật khẩu</button>
        </form>
        <div class="login-footer-actions">
            <a href="/login">← Quay lại đăng nhập</a>
        </div>
    </div>
</div>
</body>
</html>
